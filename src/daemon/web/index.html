<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawForge</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        header h1 { font-size: 1.25rem; color: #e94560; }
        #status { font-size: 0.875rem; color: #888; }
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        #sidebar {
            width: 250px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }
        #sidebar h2 {
            padding: 1rem;
            font-size: 0.875rem;
            color: #888;
            text-transform: uppercase;
            border-bottom: 1px solid #0f3460;
        }
        #sessions {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .session {
            padding: 0.75rem;
            margin-bottom: 0.25rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .session:hover { background: #0f3460; }
        .session.active { background: #e94560; }
        #new-session {
            margin: 0.5rem;
            padding: 0.75rem;
            background: #0f3460;
            border: none;
            color: #eee;
            border-radius: 4px;
            cursor: pointer;
        }
        #new-session:hover { background: #e94560; }
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
        }
        .message.user {
            background: #0f3460;
            margin-left: auto;
        }
        .message.assistant {
            background: #16213e;
            border: 1px solid #0f3460;
        }
        .message pre {
            background: #1a1a2e;
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .message code {
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
        }
        #input-area {
            padding: 1rem;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        #input-form {
            display: flex;
            gap: 0.5rem;
        }
        #message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #eee;
            font-size: 1rem;
            resize: none;
        }
        #message-input:focus {
            outline: none;
            border-color: #e94560;
        }
        #send-btn {
            padding: 0.75rem 1.5rem;
            background: #e94560;
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }
        #send-btn:hover { background: #d63a52; }
        #send-btn:disabled { background: #666; cursor: not-allowed; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #888;
            border-radius: 50%;
            border-top-color: #e94560;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .token-info {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>ClawForge</h1>
        <div id="status">Connecting...</div>
    </header>
    <main>
        <div id="sidebar">
            <h2>Sessions</h2>
            <div id="sessions"></div>
            <button id="new-session">+ New Session</button>
        </div>
        <div id="chat-area">
            <div id="messages"></div>
            <div id="input-area">
                <form id="input-form">
                    <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
                    <button type="submit" id="send-btn">Send</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '';
        let currentSession = null;
        let isLoading = false;

        // Auto-resize textarea
        const input = document.getElementById('message-input');
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        });

        // Handle Enter to submit (Shift+Enter for newline)
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('input-form').dispatchEvent(new Event('submit'));
            }
        });

        // Load status
        async function loadStatus() {
            try {
                const res = await fetch(API_BASE + '/api/status');
                const data = await res.json();
                document.getElementById('status').textContent =
                    `v${data.version} | ${data.active_sessions} sessions | ${data.auth_profile || 'No auth'}`;
            } catch (e) {
                document.getElementById('status').textContent = 'Disconnected';
            }
        }

        // Load sessions
        async function loadSessions() {
            try {
                const res = await fetch(API_BASE + '/api/sessions');
                const sessions = await res.json();
                const container = document.getElementById('sessions');
                container.innerHTML = sessions.map(s => `
                    <div class="session ${s.id === currentSession ? 'active' : ''}" data-id="${s.id}">
                        ${s.name || 'Session ' + s.id.slice(0, 8)}
                        <br><small>${s.message_count} messages</small>
                    </div>
                `).join('');

                // Add click handlers
                container.querySelectorAll('.session').forEach(el => {
                    el.onclick = () => switchSession(el.dataset.id);
                });
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        function switchSession(id) {
            currentSession = id;
            loadSessions();
            // TODO: Load session messages
        }

        function addMessage(role, content, tokenInfo = null) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            // Simple markdown-ish rendering
            let html = content
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');

            div.innerHTML = html;

            if (tokenInfo) {
                const info = document.createElement('div');
                info.className = 'token-info';
                info.textContent = `${tokenInfo.input} in / ${tokenInfo.output} out tokens`;
                div.appendChild(info);
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Handle form submit
        document.getElementById('input-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isLoading) return;

            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            input.style.height = 'auto';

            addMessage('user', message);

            isLoading = true;
            document.getElementById('send-btn').disabled = true;

            // Add loading indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="loading"></div>';
            document.getElementById('messages').appendChild(loadingDiv);

            try {
                const res = await fetch(API_BASE + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();

                // Remove loading indicator
                loadingDiv.remove();

                if (data.error) {
                    addMessage('assistant', `Error: ${data.error}`);
                } else {
                    addMessage('assistant', data.text || '(No response)', {
                        input: data.usage.input_tokens,
                        output: data.usage.output_tokens
                    });
                }

                loadSessions();
            } catch (e) {
                loadingDiv.remove();
                addMessage('assistant', `Error: ${e.message}`);
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
            }
        });

        // New session button
        document.getElementById('new-session').onclick = async () => {
            // For now, just reload - the daemon creates a session on first message
            currentSession = null;
            document.getElementById('messages').innerHTML = '';
            loadSessions();
        };

        // Initial load
        loadStatus();
        loadSessions();
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
